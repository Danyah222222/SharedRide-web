name: SharedRide CI Testing

on:
  push:
    branches:[main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-node@v4
        with:
          node-version: '17'
          distribution: 'temurin'

      - name: Run Tests
        run: mvn test