<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: #e0f7fa;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 500px;
            margin: 60px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #0277bd;
            margin-bottom: 30px;
        }
        .user-info p {
            font-size: 16px;
            margin: 12px 0;
            padding: 12px;
            border-radius: 8px;
            background: #b3e5fc;
            color: #01579b;
        }
        .label {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>User Information</h1>
        <div class="user-info">
            <p><span class="label">Name:</span> John Doe</p>
            <p><span class="label">Email:</span> johndoe@example.com</p>
            <p><span class="label">Phone:</span> +1 234 567 8901</p>
            <p><span class="label">Membership:</span> Gold</p>
        </div>
    </div>
</body>
</html>
