<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reviews & Ratings</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #e0f7fa;
      font-family: 'Roboto', sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* Top bar */
    .topbar {
      width: 100%;
      height: 60px;
      background-color: #81d4fa;
      display: flex;
      align-items: center;
      padding: 0 15px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      position: fixed;
      top: 0;
      left: 0;
      z-index: 2;
    }

    .back {
      font-size: 26px;
      cursor: pointer;
      color: #01579b;
      text-decoration: none;
    }

    h1 {
      margin-top: 90px;
      color: #0277bd;
      font-size: 28px;
    }

    .review-card {
      background-color: #ffffff;
      width: 90%;
      max-width: 400px;
      margin-top: 20px;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
    }

    .review-name {
      font-size: 18px;
      font-weight: 600;
      color: #01579b;
    }

    .review-rating {
      color: #ffaa00;
      margin-top: 5px;
      font-size: 16px;
    }

    .review-text {
      margin-top: 10px;
      font-size: 15px;
      color: #333;
      line-height: 1.5;
    }

    textarea {
      width: 90%;
      max-width: 400px;
      height: 100px;
      border-radius: 12px;
      border: 1px solid #b3e5fc;
      padding: 12px;
      font-family: 'Roboto', sans-serif;
      margin-top: 25px;
      resize: none;
      background: #e1f5fe;
      color: #01579b;
      outline: none;
      transition: border-color 0.3s;
    }

    textarea:focus {
      border-color: #0277bd;
    }

    .add-review {
      background-color: #0277bd;
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 12px;
      margin: 20px 0 40px 0;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .add-review:hover {
      background-color: #01579b;
    }
  </style>
</head>
<body>
  <!-- Top bar -->
  <div class="topbar">
    <a href="index.html" class="back">&#9776;</a>
  </div>

  <!-- Content -->
  <h1>Reviews & Ratings</h1>

  <div class="review-card">
    <div class="review-name">Ali Mohammed</div>
    <div class="review-rating">⭐ 4.8 / 5</div>
    <div class="review-text">Ali was very kind and drove safely. Always on time and polite!</div>
  </div>

  <div class="review-card">
    <div class="review-name">Sara Ahmed</div>
    <div class="review-rating">⭐ 4.6 / 5</div>
    <div class="review-text">Friendly driver, smooth ride. Highly recommend.</div>
  </div>

  <textarea placeholder="Write your review here..."></textarea>
  <button class="add-review">Submit Review</button>
</body>
</html>
