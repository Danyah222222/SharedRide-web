
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Service</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background: #e0f7fa;
      margin: 0;
      padding: 0;
    }
    header {
      background: #0277bd;
      color: #fff;
      padding: 20px 0;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    header h1 {
      margin: 0;
      font-size: 24px;
    }
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #81d4fa;
      padding: 10px 20px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .navbar .logo {
      font-weight: bold;
      color: #01579b;
      margin: 0;
    }
    .nav-links {
      list-style: none;
      display: flex;
      margin: 0;
      padding: 0;
    }
    .nav-links li {
      margin-left: 20px;
    }
    .nav-links a {
      text-decoration: none;
      color: #01579b;
      font-weight: 500;
      transition: color 0.3s;
    }
    .nav-links a:hover {
      color: #0277bd;
    }
    main {
      display: flex;
      justify-content: center;
      margin-top: 50px;
      padding: 0 20px;
    }
    .contact {
      background: #ffffff;
      padding: 30px;
      border-radius: 15px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }
    .contact h2 {
      color: #0277bd;
      text-align: center;
      margin-bottom: 20px;
    }
    .contact p {
      text-align: center;
      margin-bottom: 25px;
      color: #01579b;
    }
    #contactForm input, #contactForm textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #b3e5fc;
      background: #e1f5fe;
      color: #01579b;
      font-size: 14px;
      outline: none;
      transition: border-color 0.3s;
    }
    #contactForm input:focus, #contactForm textarea:focus {
      border-color: #0277bd;
    }
    #contactForm textarea {
      resize: vertical;
      min-height: 100px;
    }
    #contactForm button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      background: #0277bd;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }
    #contactForm button:hover {
      background: #01579b;
    }
    .input-error {
      border-color: #b00020 !important;
      box-shadow: 0 0 0 3px rgba(176,0,32,0.06);
    }
    #formMessage {
      text-align: center;
      margin-top: 15px;
      color: #01579b;
      font-weight: bold;
    }
    /* success toast */
      #successToast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      background: #2e7d32;
      color: #fff;
      padding: 12px 18px;
      border-radius: 8px;
      box-shadow: 0 6px 18px rgba(46,125,50,0.18);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 240ms ease, transform 240ms ease;
      z-index: 9999;
      pointer-events: none;
    }
    #successToast.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    #successToast .toast-close {
      position: absolute;
      top: 6px;
      right: 8px;
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.9);
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      padding: 4px;
    }
    /* dynamic toast (created at runtime) uses same visuals */
    .dynamic-toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      background: #2e7d32;
      color: #fff;
      padding: 12px 18px;
      border-radius: 8px;
      box-shadow: 0 6px 18px rgba(46,125,50,0.18);
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .dynamic-toast .toast-text { flex: 1; }
    .dynamic-toast .toast-close {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.95);
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
    }
  </style>
</head>
<body>
  <header>
    <h1>SharedRide – Customer Service</h1>
  </header>

  <nav class="navbar">
    <h2 class="logo">SharedRide</h2>
    <ul class="nav-links">
      <li><a href="userDetails.html">User Details</a></li>
      <li><a href="history.html">Ride History</a></li>
      <li><a href="qna.html">Q&A</a></li>
      <li><a href="customerService.html">Customer Service</a></li>
    </ul>
  </nav>

  <main>
    <section class="contact">
      <h2>Need Help?</h2>
      <p>Fill out this form and our support team will contact you soon.</p>

      <div id="contactForm">
        <input id="cs-name" type="text" placeholder="Your Name" required />
        <input id="cs-studentId" type="text" placeholder="Student ID" required inputmode="numeric" pattern="\d*" />
        <input id="cs-email" type="email" placeholder="Email" required />
        <textarea id="cs-message" placeholder="Describe your issue..." required></textarea>
        <button id="cs-submit" type="button">Send</button>
      </div>

      <p id="formMessage"></p>
      <!-- Clear DB button (clears saved contact messages). Visible on customer service page per request. -->
      <button id="clearDbBtn" style="margin-top:12px;width:100%;padding:12px;border-radius:8px;border:none;background:#b00020;color:#fff;cursor:pointer">Clear Saved Messages</button>
      <div id="successToast" aria-live="polite">
        <span id="successToastText" class="toast-text"></span>
        <button class="toast-close" id="successToastClose" aria-label="Close">×</button>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
  <script src="./scripts/emergency.js"></script>
  <script>
    // API base: when developing with Go Live the backend runs on localhost:3000
    const API_BASE = window.API_BASE || 'http://localhost:3000';
    (function () {
    const form = document.getElementById('contactForm');
    const msgEl = document.getElementById('formMessage');
    const submitBtn = document.getElementById('cs-submit');

      function showMsg(text, isError) {
        msgEl.textContent = text;
        msgEl.style.color = isError ? '#b00020' : '#01579b';
      }

      async function sendContact() {
        showMsg('Sending...', false);
        submitBtn.disabled = true;

        const payload = {
          name: document.getElementById('cs-name').value.trim(),
          studentId: document.getElementById('cs-studentId').value.trim(),
          email: document.getElementById('cs-email').value.trim(),
          message: document.getElementById('cs-message').value.trim()
        };

        // client-side validation (required + formats)
        function clearErrors() {
          ['cs-name','cs-studentId','cs-email','cs-message'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.classList.remove('input-error');
          });
        }

        function validateAll() {
          const errors = [];
          clearErrors();
          if (!payload.name) {
            errors.push('Name is required.');
            document.getElementById('cs-name').classList.add('input-error');
          }
          if (!payload.studentId) {
            errors.push('Student ID is required.');
            document.getElementById('cs-studentId').classList.add('input-error');
          } else if (!/^[0-9]+$/.test(payload.studentId)) {
            errors.push('Student ID must contain digits only.');
            document.getElementById('cs-studentId').classList.add('input-error');
          }
          if (!payload.email) {
            errors.push('Email is required.');
            document.getElementById('cs-email').classList.add('input-error');
          } else {
            const eRe = /^[^@\s]+@[^@\s]+\.[^@\s]+$/;
            if (!eRe.test(payload.email)) {
              errors.push('Email address looks invalid.');
              document.getElementById('cs-email').classList.add('input-error');
            }
          }
          if (!payload.message) {
            errors.push('Message is required.');
            document.getElementById('cs-message').classList.add('input-error');
          } else if (payload.message.length < 10) {
            errors.push('Message must be at least 10 characters.');
            document.getElementById('cs-message').classList.add('input-error');
          }
          return errors;
        }

        const validationErrors = validateAll();
        if (validationErrors.length) {
          showMsg(validationErrors.join(' '), true);
          submitBtn.disabled = false;
          return;
        }

        try {
          const res = await fetch(`${API_BASE}/api/contact`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          let data = null;
          const ct = res.headers.get('content-type') || '';
          if (ct.includes('application/json')) {
            data = await res.json().catch(() => null);
          } else {
            const text = await res.text();
            data = text ? { message: text } : null;
          }

          if (!res.ok) {
            showMsg((data && data.message) || 'Failed to send message', true);
            return;
          }

          const id = data && data.contact && data.contact.id ? data.contact.id : '';
          const successText = 'Message sent. Our team will contact you soon.' + (id ? (' (ID: ' + id + ')') : '');
          // Do not show the inline success message below the button.
          // Only show a persistent toast notification (user requested no inline success).
          showToast(successText);
          // clear fields manually because this is not a <form>
          document.getElementById('cs-name').value = '';
          document.getElementById('cs-studentId').value = '';
          document.getElementById('cs-email').value = '';
          document.getElementById('cs-message').value = '';
        } catch (err) {
          showMsg('Network or server error. Try again later.', true);
        } finally {
          submitBtn.disabled = false;
        }
      }

      submitBtn.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); console.log('Send clicked'); sendContact(); });
      // no native form submission possible because we use a non-form container
    })();

    // toast helper (outside the IIFE so accessible if needed)
    // ensure toast remains visible until user explicitly closes it
    // Create a dynamic, persistent toast element so it cannot be accidentally removed
    
    
    
    function showToast(text, duration = 0) {
      // duration === 0 => persistent until user closes
      const toast = document.createElement('div');
      toast.className = 'dynamic-toast';

      const span = document.createElement('span');
      span.className = 'toast-text';
      span.textContent = text;

      const btn = document.createElement('button');
      btn.className = 'toast-close';
      btn.type = 'button';
      btn.setAttribute('aria-label', 'Close');
      btn.textContent = '×';

      toast.appendChild(span);
      toast.appendChild(btn);
      document.body.appendChild(toast);

      // show (no css transition reliance required)
      toast.style.opacity = '1';

      function removeToast() {
        try { document.body.removeChild(toast); } catch (e) {}
        try { sessionStorage.removeItem('cs_success'); } catch (e) {}
      }

      btn.addEventListener('click', () => {
        removeToast();
      }, { once: true });

      // persist the visible success message so it survives reloads
      try { sessionStorage.setItem('cs_success', text); } catch (e) {}

      if (duration > 0) {
        setTimeout(() => removeToast(), duration);
      }
      }

    // restore persistent success toast after reload (if any)
    (function restorePersistentToast() {
      try {
        const txt = sessionStorage.getItem('cs_success');
        if (txt) {
          // show again, persistent until user closes
          showToast(txt, 0);
        }
      } catch (e) {}
    })();
    
    // Clear DB button handler (calls DELETE /api/contact)
    (function attachClearDb() {
      const btn = document.getElementById('clearDbBtn');
      if (!btn) return;
      btn.addEventListener('click', async () => {
        if (!confirm('Delete ALL saved contact messages? This cannot be undone.')) return;
        try {
          const res = await fetch(`${API_BASE}/api/contact`, { method: 'DELETE' });
          const data = await res.json().catch(() => null);
          if (!res.ok) {
            // show inline error under form
            showMsg((data && data.message) ? data.message : 'Failed to clear messages', true);
            return;
          }
          // success: clear any stored success toast and show confirmation toast
          try { sessionStorage.removeItem('cs_success'); } catch (e) {}
          showToast((data && data.message) ? data.message : 'All contact messages were deleted.');
          // ensure any inline messages are cleared
          showMsg('', false);
        } catch (err) {
          showMsg('Server error. Please try again later.', true);
        }
      });
    })();
  </script>
</body>
</html>
