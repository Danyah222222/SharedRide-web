<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Past Rides</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: #e0f7fa;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 800px;
            margin: 50px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #0277bd;
            margin-bottom: 30px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 10px;
            overflow: hidden;
        }
        th, td {
            padding: 14px;
            text-align: left;
        }
        th {
            background-color: #81d4fa;
            color: #01579b;
        }
        tr:nth-child(even) {
            background-color: #e1f5fe;
        }
        tr:hover {
            background-color: #b3e5fc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Past Rides</h1>
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>From</th>
                    <th>To</th>
                    <th>Driver</th>
                    <th>Fare</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>2025-11-01</td>
                    <td>Main Street</td>
                    <td>Central Park</td>
                    <td>Jane Smith</td>
                    <td>$12.50</td>
                </tr>
                <tr>
                    <td>2025-11-03</td>
                    <td>City Mall</td>
                    <td>Airport</td>
                    <td>Mike Johnson</td>
                    <td>$25.00</td>
                </tr>
                <tr>
                    <td>2025-11-05</td>
                    <td>Home</td>
                    <td>University</td>
                    <td>Sarah Lee</td>
                    <td>$8.75</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
