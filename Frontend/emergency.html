<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Emergency</title>
    <style>
        body {
            background-color: #ffdddd;
            text-align: center;
            padding-top: 80px;
            font-family: Arial, sans-serif;
        }
        .box {
            background: white;
            padding: 25px;
            margin: auto;
            width: 80%;
            max-width: 450px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        .btn {
            background: #ff4444;
            color: white;
            padding: 12px 20px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        .btn:hover { background: #cc0000; }
    </style>
</head>
<body>

<div class="box">
    <h2>🚨 Emergency Alert Sent</h2>
    <p>Your alert has been recorded in the system.</p>

    <button class="btn" onclick="window.location.href='tel:999'">Call Emergency</button>
    <button class="btn" onclick="window.location.href='index.html'">Back to Home</button>
</div>

</body>
</html>
