<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Favorite Driver</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #e0f7fa;
      font-family: 'Roboto', sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* Top bar / Navbar */
    .navbar {
      width: 100%;
      height: 60px;
      background: #81d4fa;
      display: flex;
      align-items: center;
      padding: 0 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      position: fixed;
      top: 0;
      left: 0;
      z-index: 2;
      justify-content: space-between;
    }

    .navbar .logo {
      font-weight: bold;
      color: #01579b;
      font-size: 20px;
    }

    .nav-links {
      list-style: none;
      display: flex;
      margin: 0;
      padding: 0;
    }

    .nav-links li {
      margin-left: 20px;
    }

    .nav-links a {
      text-decoration: none;
      color: #01579b;
      font-weight: 500;
      transition: color 0.3s;
    }

    .nav-links a:hover {
      color: #0277bd;
    }

    h1 {
      margin-top: 90px;
      color: #0277bd;
      font-size: 28px;
    }

    .driver-card {
      background-color: #ffffff;
      width: 90%;
      max-width: 400px;
      margin-top: 30px;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
      text-align: center;
      transition: transform 0.2s;
    }

    .driver-card:hover {
      transform: scale(1.02);
    }

    .driver-photo {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #0277bd;
    }

    .driver-name {
      font-size: 20px;
      margin-top: 12px;
      color: #01579b;
      font-weight: 600;
    }

    .driver-rating {
      color: #ffaa00;
      font-size: 18px;
      margin-top: 5px;
    }

    .contact-btn {
      margin-top: 18px;
      background-color: #0277bd;
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.3s;
    }

    .contact-btn:hover {
      background-color: #01579b;
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">SharedRide</div>
    <ul class="nav-links">
      <li><a href="userDetails.html">User Details</a></li>
      <li><a href="history.html">Ride History</a></li>
      <li><a href="qna.html">Q&A</a></li>
      <li><a href="customerService.html">Customer Service</a></li>
      <li><a href="reviews.html">Reviews</a></li>
    </ul>
  </nav>

  <!-- Content -->
  <h1>Favorite Driver</h1>

  <div class="driver-card">
    <img src="https://cdn-icons-png.flaticon.com/512/1995/1995623.png" alt="Driver" class="driver-photo" />
    <div class="driver-name">Ali Mohammed</div>
    <div class="driver-rating">⭐ 4.8 / 5</div>
    <button class="contact-btn">Contact Driver</button>
  </div>
</body>
</html>
