<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schedule a Ride</title>
  <style>
    /* Page background */
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: #ADD8E6; /* light blue */
      font-family: Arial, sans-serif;
    }

    /* Container for content */
    #container {
      width: 650px;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 20px;
    }

    /* Search bar */
    #search-bar {
      width: 100%;
      padding: 12px 20px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-bottom: 15px;
    }

    /* Date picker */
    #date-picker {
      width: 100%;
      padding: 12px 20px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-bottom: 15px;
    }

    /* Map container */
    #map-container {
      width: 100%;
      height: 400px;
      border: 2px solid #333;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
    }

    #campus-map {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* Schedule button */
    .button {
      background-color: white;
      color: black;
      border: none;
      padding: 15px 40px;
      font-size: 18px;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .button:hover {
      background-color: #f0f0f0;
    }
  </style>
</head>
<body>
  <div id="container">
    <!-- Search bar -->
    <input type="text" id="search-bar" placeholder="Enter pickup location..." />

    <!-- Date picker -->
    <input type="date" id="date-picker" />

    <!-- Map -->
    <div id="map-container">
      <img src="images/campus-map.png.png" alt="Campus Map" id="campus-map" />
    </div>

    <!-- Schedule button -->
    <button class="button">Schedule Ride</button>
  </div>
</body>
</html>
