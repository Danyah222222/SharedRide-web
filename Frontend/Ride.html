
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ride Page</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: Arial, sans-serif; }
    body { background-color: #ADD8E6; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding-top:70px; }

    /* Top bar */
    .topbar {
      width: 100%;
      height: 60px;
      background-color: white;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 0 15px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      position: fixed;
      top: 0;
      left: 0;
      z-index: 2;
    }

    .hamburger {
      font-size: 26px;
      cursor: pointer;
      color: #333;
    }

    /* Sidebar */
    .sidebar { 
      position:fixed; top:0; left:-260px; width:260px; height:100%; 
      background:white; box-shadow:2px 0 10px rgba(0,0,0,0.1); 
      padding:70px 20px 20px; transition:left 0.4s ease; z-index:3; 
    }
    .sidebar.active { left:0; }
    .sidebar ul { list-style:none; }
    .sidebar ul li { margin:20px 0; font-size:18px; display:flex; align-items:center; cursor:pointer; transition:color 0.3s; }
    .sidebar ul li:hover { color:#00fff2; }

    .sos-btn { background:red; color:white; border:none; border-radius:50%; width:80px; height:80px; font-size:20px; font-weight:bold; position:absolute; bottom:30px; left:50%; transform:translateX(-50%); cursor:pointer; box-shadow:0 4px 8px rgba(0,0,0,0.3); transition: transform 0.2s; }
    .sos-btn:hover { transform:translateX(-50%) scale(1.05); }

    /* Search bar */
    #search-container { width:90%; max-width:700px; margin-bottom:10px; }
    #searchInput { width:100%; padding:8px 12px; font-size:16px; border-radius:6px; border:1px solid #333; }

    /* Map */
    #map-container { width:90%; max-width:700px; height:400px; border:2px solid #333; border-radius:12px; overflow:hidden; margin-bottom:20px; }
    #map { width:100%; height:100%; }

    /* Buttons */
    #button-container { display:flex; gap:20px; justify-content:center; margin-bottom:20px; }
    .button { background:white; color:black; border:none; padding:15px 35px; font-size:18px; border-radius:8px; cursor:pointer; transition:background-color 0.3s; }
    .button:hover { background:#f0f0f0; }

    /* Car emoji icon */
    .car-emoji-icon { font-size: 30px; text-align:center; line-height:1; }

  </style>
</head>
<body>
  <!-- Topbar -->
  <div class="topbar">
    <div class="hamburger" id="menuBtn">&#9776;</div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <ul>
      <li><a href="userdetail.html">👤 User Info</a></li>
      <li><a href="history.html">🕓 Past Rides</a></li>
      <li><a href="fav-driver.html">❤️ Favorite Driver</a></li>
      <li><a href="customerService.html">💬 Customer Service</a></li>
      <li><a href="language.html">🌐 Language Support</a></li>
      <li><a href="qna.html">❓ Q&A</a></li>
      <li><a href="review.html">📝 Reviews</a></li>
    </ul>
    <button class="sos-btn" onclick="sendEmergencyAlert()">SOS</button>
  </div>

  <!-- Search bar -->
  <div id="search-container">
    <input type="text" id="searchInput" placeholder="Enter location">
  </div>

  <!-- Map -->
  <div id="map-container">
    <div id="map"></div>
  </div>

  <!-- Buttons -->
  <div id="button-container">
    <button id="orderCarBtn" class="button">Order a Car Now</button>
    <button class="button" onclick="checkSchedule()">Schedule a Ride</button>
  </div>

  <!-- Backend scripts -->
  <script src="../Backend/ride-backend.js"></script>
  <script src="../Backend/schedule-backend.js"></script>
  <script src="../Backend/emergency.js"></script>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Page JS -->
  <script>
    // Sidebar toggle
    const menuBtn = document.getElementById("menuBtn");
    const sidebar = document.getElementById("sidebar");
    menuBtn.addEventListener("click", () => {
      sidebar.classList.toggle("active");
    });

    // Map setup
    const map = L.map("map").setView([24.7136, 46.6753], 16);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19
    }).addTo(map);

    document.getElementById("orderCarBtn").addEventListener("click", () => {
      window.location.href = "orderCar.html";
    });

    const searchInput = document.getElementById("searchInput");
    let pickupMarker = null;
    let cars = [];
    let carMarkers = [];
    let currentCenter = { lat: 24.7136, lon: 46.6753 };
    const carIcon = L.divIcon({
      className: "car-emoji-icon",
      html: "🚗",
      iconSize: [30, 30],
      iconAnchor: [15, 30]
    });

    // Creating cars around the center when the page first loads
    async function initCarsAroundCenter(centerLat, centerLon) {
      carMarkers.forEach(({ marker }) => map.removeLayer(marker));
      carMarkers = [];
      cars = [];
      const carCount = 3;
      for (let i = 0; i < carCount; i++) {
        const route = await buildRandomRouteNear(centerLat, centerLon);
        if (!route || route.length === 0) continue;
        const car = {
          id: i + 1,
          route,
          routeIndex: 0,
          lat: route[0].lat,
          lon: route[0].lon
        };
        cars.push(car);
        const marker = L.marker([car.lat, car.lon], { icon: carIcon }).addTo(map);
        carMarkers.push({ car, marker });
      }
    }

    // Move cars along routes
    async function moveCarsOnRoutes() {
      if (cars.length === 0) return;
      for (let i = 0; i < cars.length; i++) {
        const car = cars[i];
        const markerData = carMarkers[i];
        if (!markerData) continue;
        car.routeIndex++;
        if (car.routeIndex >= car.route.length - 2) {
          const newRoute = await buildRandomRouteNear(currentCenter.lat, currentCenter.lon);
          if (newRoute.length > 0) {
            car.route = newRoute;
            car.routeIndex = 0;
          }
        }
        const point = car.route[car.routeIndex];
        if (!point) continue;
        car.lat = point.lat;
        car.lon = point.lon;
        markerData.marker.setLatLng([car.lat, car.lon]);
      }
    }

    setInterval(moveCarsOnRoutes, 1600);
    initCarsAroundCenter(currentCenter.lat, currentCenter.lon);

    // Search functionality
    searchInput.addEventListener("keydown", async (e) => {
      if (e.key !== "Enter") return;
      const text = searchInput.value.trim();
      if (!text) return;
      const result = await searchLocation(text);
      if (!result) {
        alert("Location not found!");
        return;
      }
      currentCenter = { lat: result.lat, lon: result.lon };
      map.setView([result.lat, result.lon], 16);
      if (pickupMarker) map.removeLayer(pickupMarker);
      pickupMarker = L.marker([result.lat, result.lon])
        .addTo(map)
        .bindPopup(result.displayName)
        .openPopup();
      await initCarsAroundCenter(currentCenter.lat, currentCenter.lon);
    });

    function checkSchedule() {
      const ride = getScheduledRide(); 
      if (ride) {
        alert(`⚠️ You already have a scheduled ride on ${ride.date} at ${ride.time}`);
      }
      window.location.href = "futureRide.html";
    }
  </script>
</body>
</html>
