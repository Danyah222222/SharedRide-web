<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Map Page</title>
  <style>
    /* Page background */
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #ADD8E6; /* light blue */
      font-family: Arial, sans-serif;
    }

    /* Map container */
    #map-container {
      width: 600px;   
      height: 400px;
      border: 2px solid #333;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
    }

    /* Campus map image */
    #campus-map {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* Buttons container */
    #button-container {
      display: flex;
      gap: 20px; /* space between buttons */
      justify-content: center;
      margin-bottom: 20px;
    }

    /* Buttons style */
    .button {
      background-color: white;
      color: black;
      border: none;
      padding: 15px 35px;
      font-size: 18px;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .button:hover {
      background-color: #f0f0f0;
    }
  </style>
</head>
<body>
  <!-- Map -->
  <div id="map-container">
    <img src="images/campus-map.png.png" alt="Campus Map" id="campus-map" />
  </div>

  <!-- Buttons side by side -->
  <div id="button-container">
    <button class="button">Order a Car Now</button>
    <button class="button">Schedule a Ride</button>
  </div>
</body>
</html>
