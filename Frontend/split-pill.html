<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Split the Bill</title>
  <style>
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex; 
      justify-content: center; 
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      margin: 0;
    }
    .container { 
      background: #fff; 
      padding: 30px; 
      border-radius: 20px; 
      width: 100%;
      max-width: 450px;
      text-align: center; 
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    h1 { 
      color: #667eea; 
      margin-bottom: 30px;
      font-size: 28px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .option-btn { 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff; 
      border: none; 
      padding: 15px 25px; 
      border-radius: 12px; 
      cursor: pointer; 
      margin: 8px 0; 
      width: 85%;
      font-size: 16px;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }
    .option-btn:hover { 
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }
    .form-section { 
      margin-top: 25px; 
      display: none; 
      text-align: left;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    label { 
      display: block; 
      margin-bottom: 8px; 
      font-weight: 600;
      color: #333;
      font-size: 14px;
    }
    input[type="number"] { 
      width: 100%; 
      padding: 12px; 
      border-radius: 10px; 
      border: 2px solid #e0e7ff; 
      margin-bottom: 18px;
      font-size: 15px;
      transition: border 0.3s ease;
      box-sizing: border-box;
    }
    input[type="number"]:focus {
      outline: none;
      border-color: #667eea;
    }
    button.submit { 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff; 
      border: none; 
      padding: 14px 20px; 
      border-radius: 10px; 
      cursor: pointer; 
      width: 100%;
      font-size: 16px;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }
    button.submit:hover { 
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }
    .msg-close {
      float: right;
      background: #f3f4f6;
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      font-size: 16px;
      color: #6b7280;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    .msg-close:hover {
      background: #e5e7eb;
      color: #374151;
    }
    .bill-card {
      background: linear-gradient(135deg, #f0f4ff 0%, #e8edff 100%);
      border: none;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.15);
      text-align: left;
      transition: transform 0.2s ease;
    }
    .bill-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.25);
    }
    .bill-card .bill-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 15px;
    }
    .bill-card .bill-row:last-of-type {
      margin-bottom: 15px;
    }
    .bill-card .bill-label {
      color: #667eea;
      font-weight: 700;
    }
    .bill-card .bill-value {
      color: #374151;
      font-weight: 600;
    }
    .bill-card .copy-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      width: 100%;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 3px 10px rgba(102, 126, 234, 0.3);
    }
    .bill-card .copy-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.5);
    }
    .bill-type-badge {
      display: inline-block;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    #result, #persistent {
      margin-top: 18px;
      padding: 12px;
      border-radius: 10px;
      background: #f0f9ff;
      color: #1e3a8a;
      font-weight: 600;
    }
    #toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #1f2937;
      color: #fff;
      padding: 12px 20px;
      border-radius: 12px;
      display: none;
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
      font-weight: 600;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { transform: translateX(100px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Pay Your Ride</h1>
    <button type="button" class="option-btn" onclick="showSection('split')">Split the Bill</button>
    <button type="button" class="option-btn" onclick="showSection('full')">Pay in Full</button>
    <button type="button" class="option-btn" onclick="viewPastBills()" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);">View Past Bills</button>
    <button type="button" class="option-btn" onclick="clearBills()" style="background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);">Clear Bills</button>

    <!-- Split Bill -->
    <div class="form-section" id="split">
      <label>Total Amount ($):</label>
      <input type="number" id="totalAmountSplit" min="0" step="0.01">
      <label>Number of People:</label>
      <input type="number" id="peopleCount" min="1" step="1">
      <button type="button" class="submit" id="splitSubmit" onclick="sendSplitBill()">Submit</button>
    </div>

    <!-- Pay Full -->
    <div class="form-section" id="full">
      <label>Total Amount ($):</label>
      <input type="number" id="totalAmountFull" min="0" step="0.01">
      <button type="button" class="submit" id="fullSubmit" onclick="sendFullPay()">Submit</button>
    </div>
    <div id="result" style="margin-top:16px;color:#003380;font-weight:bold;"></div>
    <div id="persistent" style="margin-top:8px;color:#003380;font-weight:bold;"></div>
    <div id="billsList" style="margin-top:20px;"></div>
    <div id="toast" style="position:fixed;bottom:30px;right:30px;background:#1f2937;color:#fff;padding:12px 20px;border-radius:12px;display:none;box-shadow:0 6px 20px rgba(0,0,0,0.3);font-weight:600;"></div>
  </div>

  <script>
    // Load last bill on page load
    window.addEventListener('DOMContentLoaded', () => {
      displayLastBill();
    });

    function displayLastBill() {
      const lastBillData = localStorage.getItem('lastBill');
      if (!lastBillData) return;
      
      const bill = JSON.parse(lastBillData);
      const persistentEl = document.getElementById('persistent');
      
      if (bill.type === 'split') {
        const html = `<div style="background:#f0fdf4;border:2px solid #10b981;padding:15px;border-radius:12px;margin-top:15px;">
          <div style="color:#059669;font-weight:700;font-size:16px;margin-bottom:10px;">✅ Last Split Bill</div>
          <div style="color:#374151;margin-bottom:8px;"><strong>Per person:</strong> $${bill.perPerson}</div>
          <div style="color:#374151;margin-bottom:8px;"><strong>People:</strong> ${bill.people}</div>
          <div style="color:#374151;margin-bottom:12px;"><strong>Total:</strong> $${bill.total}</div>
          <button type="button" style="padding:8px 16px;border-radius:8px;border:none;background:#10b981;color:white;cursor:pointer;font-weight:600;" onclick="copyText('Split Bill ID: ${bill.billId} - Per person: $${bill.perPerson}')">Copy Details</button>
        </div>`;
        persistentEl.innerHTML = html;
      } else if (bill.type === 'full') {
        const html = `<div style="background:#fef3c7;border:2px solid #f59e0b;padding:15px;border-radius:12px;margin-top:15px;">
          <div style="color:#d97706;font-weight:700;font-size:16px;margin-bottom:10px;">✅ Last Full Payment</div>
          <div style="color:#374151;margin-bottom:12px;"><strong>Total Amount:</strong> $${bill.total}</div>
          <button type="button" style="padding:8px 16px;border-radius:8px;border:none;background:#f59e0b;color:white;cursor:pointer;font-weight:600;" onclick="copyText('Payment ID: ${bill.paymentId} - Amount: $${bill.total}')">Copy Details</button>
        </div>`;
        persistentEl.innerHTML = html;
      }
    }

    function showSection(section) {
      document.getElementById('split').style.display = 'none';
      document.getElementById('full').style.display = 'none';
      document.getElementById(section).style.display = 'block';
    }

    async function sendSplitBill() {
      const total = Number(document.getElementById("totalAmountSplit").value);
      const people = Number(document.getElementById("peopleCount").value);
      const resultEl = document.getElementById('result');

      resultEl.textContent = '';

      if (!total || total <= 0) { 
        resultEl.textContent = 'Please enter a valid total amount.'; 
        return; 
      }
      if (!people || people < 1) { 
        resultEl.textContent = 'Please enter a valid number of people.'; 
        return; 
      }

      const perPerson = (total / people).toFixed(2);
      
      try {
        const response = await fetch('http://localhost:3000/api/split-bills', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ totalAmount: total, peopleCount: people, perPerson })
        });
        
        const data = await response.json();
        
        if (data.success) {
          const billId = data.bill.id;
          const lastBill = {
            type: 'split',
            billId,
            perPerson,
            people,
            total,
            timestamp: new Date().toISOString()
          };
          localStorage.setItem('lastBill', JSON.stringify(lastBill));
          displayLastBill();
          showToast('Split bill saved to database ✅');
        } else {
          resultEl.textContent = 'Error saving to database.';
        }
      } catch (err) {
        console.error('Error:', err);
        resultEl.textContent = 'Server connection failed.';
      }

      document.getElementById("totalAmountSplit").value = '';
      document.getElementById("peopleCount").value = '';
    }

    async function sendFullPay() {
      const total = Number(document.getElementById("totalAmountFull").value);
      const resultEl = document.getElementById('result');
      resultEl.textContent = '';

      if (!total || total <= 0) { 
        resultEl.textContent = 'Please enter a valid total amount.'; 
        return; 
      }

      try {
        const response = await fetch('http://localhost:3000/api/payments', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ totalAmount: total })
        });
        
        const data = await response.json();
        
        if (data.success) {
          const paymentId = data.payment.id;
          const lastBill = {
            type: 'full',
            paymentId,
            total,
            timestamp: new Date().toISOString()
          };
          localStorage.setItem('lastBill', JSON.stringify(lastBill));
          displayLastBill();
          showToast('Full payment saved to database ✅');
        } else {
          resultEl.textContent = 'Error saving to database.';
        }
      } catch (err) {
        console.error('Error:', err);
        resultEl.textContent = 'Server connection failed.';
      }

      document.getElementById("totalAmountFull").value = '';
    }

    function copyText(text) {
      if (!navigator.clipboard) {
        alert('Clipboard not supported');
        return;
      }
      navigator.clipboard.writeText(text).then(() => {
        showToast('Copied to clipboard');
      }).catch(() => alert('Copy failed'));
    }

    function showToast(text) {
      const t = document.getElementById('toast');
      t.textContent = text;
      t.style.display = 'block';
      t.style.opacity = '1';
      if (t._timeout) clearTimeout(t._timeout);
      t._timeout = setTimeout(() => {
        t.style.transition = 'opacity 300ms';
        t.style.opacity = '0';
        setTimeout(() => { t.style.display = 'none'; t.style.transition = ''; }, 300);
      }, 2000);
    }

    async function clearBills() {
      if (!confirm('Are you sure you want to clear all bills from the database?')) {
        return;
      }
      
      try {
        const response = await fetch('http://localhost:3000/api/split-bills', {
          method: 'DELETE'
        });
        
        const data = await response.json();
        
        if (data.success) {
          showToast('All bills cleared from database ✅');
          localStorage.removeItem('lastBill');
          document.getElementById('persistent').innerHTML = '';
          document.getElementById('billsList').innerHTML = '';
        } else {
          alert('Error clearing bills.');
        }
      } catch (err) {
        console.error('Error:', err);
        alert('Server connection failed.');
      }
    }

    async function viewPastBills() {
      const billsListEl = document.getElementById('billsList');
      billsListEl.innerHTML = '<div style="text-align:center;padding:20px;color:#667eea;font-weight:600;">Loading...</div>';
      
      try {
        const [splitResponse, paymentResponse] = await Promise.all([
          fetch('http://localhost:3000/api/split-bills'),
          fetch('http://localhost:3000/api/payments')
        ]);
        
        const splitBills = await splitResponse.json();
        const payments = await paymentResponse.json();
        
        if (splitBills.length === 0 && payments.length === 0) {
          billsListEl.innerHTML = '<div style="text-align:center;padding:20px;color:#6b7280;font-weight:600;">No bills found in database</div>';
          return;
        }
        
        let html = '<h3 style="color:#667eea;margin-bottom:15px;font-size:20px;">Past Bills</h3>';
        
        // Display split bills
        splitBills.forEach(bill => {
          const date = new Date(bill.createdAt).toLocaleString();
          html += `
            <div class="bill-card">
              <div class="bill-type-badge">Split Bill</div>
              <div class="bill-row">
                <span class="bill-label">Total Amount:</span>
                <span class="bill-value">$${bill.totalAmount.toFixed(2)}</span>
              </div>
              <div class="bill-row">
                <span class="bill-label">People:</span>
                <span class="bill-value">${bill.peopleCount}</span>
              </div>
              <div class="bill-row">
                <span class="bill-label">Per Person:</span>
                <span class="bill-value">$${bill.perPerson}</span>
              </div>
              <div class="bill-row">
                <span class="bill-label">Date:</span>
                <span class="bill-value">${date}</span>
              </div>
              <button class="copy-btn" onclick="copyText('Split Bill ID: ${bill.id} - Per person: $${bill.perPerson}')">Copy Details</button>
            </div>
          `;
        });
        
        // Display full payments
        payments.forEach(payment => {
          const date = new Date(payment.createdAt).toLocaleString();
          html += `
            <div class="bill-card">
              <div class="bill-type-badge" style="background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);">Full Payment</div>
              <div class="bill-row">
                <span class="bill-label">Total Amount:</span>
                <span class="bill-value">$${payment.totalAmount.toFixed(2)}</span>
              </div>
              <div class="bill-row">
                <span class="bill-label">Date:</span>
                <span class="bill-value">${date}</span>
              </div>
              <button class="copy-btn" onclick="copyText('Payment ID: ${payment.id} - Amount: $${payment.totalAmount}')">Copy Details</button>
            </div>
          `;
        });
        
        billsListEl.innerHTML = html;
      } catch (err) {
        console.error('Error:', err);
        billsListEl.innerHTML = '<div style="text-align:center;padding:20px;color:#ef4444;font-weight:600;">Server connection failed</div>';
      }
    }
  </script>
</body>
</html>
