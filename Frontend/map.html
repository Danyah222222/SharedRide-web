<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Map</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    #search-bar {
      width: 300px;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    #map-container {
      width: 800px;
      height: 500px;
      background-color: #fff;
      border: 2px solid #333;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
    }

    #campus-map {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    #start-btn {
      padding: 12px 25px;
      background-color: #0078D7;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
    }

    #start-btn:hover {
      background-color: #005fa3;
    }
  </style>
</head>
<body>
  <input type="text" id="search-bar" placeholder="Search for a car..." />

  <div id="map-container">
    <img src="../images/campus-map.png.png" alt="Campus Map" id="campus-map" />
  </div>

  <button id="start-btn">Start</button>
</body>
</html>
