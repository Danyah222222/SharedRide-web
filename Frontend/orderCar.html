<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order a Car</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: Arial, sans-serif; }
    body { background-color: #ADD8E6; min-height: 100vh; display:flex; flex-direction: column; align-items: center; padding-top:70px; }

    .topbar { width:100%; height:60px; background:white; display:flex; align-items:center; justify-content:flex-start; padding:0 15px; box-shadow:0 2px 6px rgba(0,0,0,0.1); position:fixed; top:0; left:0; z-index:2; }
    .hamburger { font-size:26px; cursor:pointer; color:#333; }

    .sidebar { position:fixed; top:0; left:-260px; width:260px; height:100%; background:white; box-shadow:2px 0 10px rgba(0,0,0,0.1); padding:70px 20px 20px; transition:left 0.4s ease; z-index:3; }
    .sidebar.active { left:0; }
    .sidebar ul { list-style:none; }
    .sidebar ul li { margin:20px 0; font-size:18px; display:flex; align-items:center; cursor:pointer; transition:color 0.3s; }
    .sidebar ul li:hover { color:#00fff2; }

    .sos-btn { background:red; color:white; border:none; border-radius:50%; width:80px; height:80px; font-size:20px; font-weight:bold; position:absolute; bottom:30px; left:50%; transform:translateX(-50%); cursor:pointer; box-shadow:0 4px 8px rgba(0,0,0,0.3); transition: transform 0.2s; }
    .sos-btn:hover { transform:translateX(-50%) scale(1.05); }

    #map-container { width:90%; max-width:700px; height:400px; border:2px solid #333; border-radius:12px; overflow:hidden; margin-bottom:20px; }
    #map { width:100%; height:100%; }

    .form-group { width:90%; max-width:700px; margin-bottom:15px; display:flex; flex-direction: column; }
    .form-group label { margin-bottom:5px; font-weight:bold; }
    .form-group input { padding:10px; border-radius:6px; border:1px solid #333; font-size:16px; }

    .chat-with-driver, .split-pill, .cancel-btn {
      padding:15px 40px;
      font-size:18px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      transition: background-color 0.3s;
      margin-bottom:15px;
    }

    .chat-with-driver { background-color:#007bff; color:white; }
    .chat-with-driver:hover { background-color:#0056b3; }

    .split-pill { background-color:#28a745; color:white; }
    .split-pill:hover { background-color:#1e7e34; }

    .cancel-btn { background-color:#007bff; color:white; margin-left:10px; }
    .cancel-btn:hover { background-color:#0056b3; }

    #driver-info { width:90%; max-width:700px; background:white; padding:15px; border-radius:10px; margin-bottom:20px; box-shadow:0 2px 6px rgba(0,0,0,0.2); }
  </style>
</head>
<body>

  <!-- Topbar -->
  <div class="topbar">
    <div class="hamburger" id="menuBtn">&#9776;</div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <ul>
      <li><a href="userdetail.html">👤 User Info</a></li>
      <li><a href="history.html">🕓 Past Rides</a></li>
      <li><a href="fav-driver.html">❤️ Favorite Driver</a></li>
      <li><a href="customerService.html">💬 Customer Service</a></li>
      <li><a href="language.html">🌐 Language Support</a></li>
      <li><a href="qna.html">❓ Q&A</a></li>
      <li><a href="review.html">📝 Reviews</a></li>
    </ul>
    <button class="sos-btn" onclick="sendEmergencyAlert()">SOS</button>
  </div>

  <!-- Map -->
  <div id="map-container">
    <div id="map"></div>
  </div>

  <!-- Pickup / Drop-off -->
  <div class="form-group">
    <label for="pickup">Pickup Location:</label>
    <input type="text" id="pickup" placeholder="Enter pickup location">
  </div>
  <div class="form-group">
    <label for="dropoff">Drop-off Location:</label>
    <input type="text" id="dropoff" placeholder="Enter drop-off location">
  </div>

  <!-- Driver Info -->
  <div id="driver-info">
    <h3>Driver Info</h3>
    <p id="driver-name">Name: —</p>
    <p id="driver-car">Car: —</p>
    <p id="driver-plate">Plate: —</p>
    <button class="chat-with-driver">Chat with Driver</button>
  </div>

  <!-- Split Pill / Cancel Buttons -->
  <div style="display:flex; gap:10px; margin-bottom:20px;">
    <button class="split-pill">View Bill</button>
    <button class="cancel-btn">Cancel</button>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script>
    // Wait for DOM
    document.addEventListener("DOMContentLoaded", () => {
      // Sidebar toggle
      const menuBtn = document.getElementById("menuBtn");
      const sidebar = document.getElementById("sidebar");
      menuBtn.addEventListener("click", () => sidebar.classList.toggle("active"));

      // Map initialization
      const campusCenter = [24.7136, 46.6753];
      const map = L.map("map").setView(campusCenter, 16);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: '&copy; OpenStreetMap contributors',
        maxZoom: 19
      }).addTo(map);

      // Pickup marker
      const pickupMarker = L.marker(campusCenter, {draggable:true}).addTo(map);
      pickupMarker.bindPopup("Drag to set pickup location").openPopup();
      pickupMarker.on('dragend', (e) => {
        const pos = e.target.getLatLng();
        document.getElementById('pickup').value = `Lat: ${pos.lat.toFixed(5)}, Lng: ${pos.lng.toFixed(5)}`;
      });

      // Example driver
      const assignedDriver = { name:"Ahmed Massaud", car:"Toyota Camry", plate:"R12345", location:[24.7145, 46.6765] };
      document.getElementById("driver-name").innerText = `Name: ${assignedDriver.name}`;
      document.getElementById("driver-car").innerText = `Car: ${assignedDriver.car}`;
      document.getElementById("driver-plate").innerText = `Plate: ${assignedDriver.plate}`;

      // Driver marker with emoji
      L.marker(assignedDriver.location, {
        icon: L.divIcon({
          className: 'driver-emoji',
          html: '<div style="font-size:40px;">🚗</div>',
          iconSize: [40, 40],
          iconAnchor: [20, 40],
          popupAnchor: [0, -40]
        })
      }).addTo(map).bindPopup("Driver location");

      // Button redirects
      document.querySelector(".chat-with-driver").addEventListener("click", () => {
        window.location.href = "chat-with-driver.html";
      });

      document.querySelector(".split-pill").addEventListener("click", () => {
        window.location.href = "split-pill.html";
      });

      document.querySelector(".cancel-btn").addEventListener("click", () => {
        window.location.href = "Ride.html";
      });
    });
  </script>

  <script src="../Backend/emergency.js"></script>
</body>
</html>
